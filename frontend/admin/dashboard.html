<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoceGestor — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="protegida">

  <header class="app-header">
    <a class="app-header__brand" href="dashboard.html">🍰 DoceGestor</a>
    <nav class="app-header__nav">
      <a class="app-header__link active" href="dashboard.html">Dashboard</a>
      <a class="app-header__link" href="produtos.html">Produtos</a>
      <a class="app-header__link" href="pedidos.html">Pedidos</a>
      <button class="btn btn--outline" id="logoutBtn" type="button">Sair</button>
    </nav>
  </header>

  <main class="app-main">

    <h1 class="page-title">Dashboard</h1>

    <!-- Cards de resumo -->
    <div class="dashboard-grid" id="statsGrid">
      <div class="stat-card">
        <p class="stat-card__valor" id="statTotal">—</p>
        <p class="stat-card__label">Total de pedidos</p>
      </div>
      <div class="stat-card stat-card--pendente">
        <p class="stat-card__valor" id="statPendente">—</p>
        <p class="stat-card__label">Pendentes</p>
      </div>
      <div class="stat-card stat-card--confirmado">
        <p class="stat-card__valor" id="statConfirmado">—</p>
        <p class="stat-card__label">Confirmados</p>
      </div>
      <div class="stat-card stat-card--entregue">
        <p class="stat-card__valor" id="statEntregue">—</p>
        <p class="stat-card__label">Entregues</p>
      </div>
    </div>

    <!-- Últimos pedidos -->
    <h2 class="section-title">Últimos pedidos</h2>
    <p class="estado-vazio" id="loadingMsg">Carregando…</p>
    <div class="pedidos-table-wrap" id="tabelaWrap" hidden>
      <table class="pedidos-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Data</th>
            <th>Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="pedidosBody"></tbody>
      </table>
    </div>

  </main>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/dashboard.js"></script>

</body>
</html>
