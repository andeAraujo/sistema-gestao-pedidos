<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoceGestor — Produtos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="protegida">

  <header class="app-header">
    <a class="app-header__brand" href="dashboard.html">🍰 DoceGestor</a>
    <nav class="app-header__nav">
      <a class="app-header__link" href="dashboard.html">Dashboard</a>
      <a class="app-header__link active" href="produtos.html">Produtos</a>
      <a class="app-header__link" href="pedidos.html">Pedidos</a>
      <button class="btn btn--outline" id="logoutBtn" type="button">Sair</button>
    </nav>
  </header>

  <main class="app-main">

    <div class="page-header">
      <h1 class="page-title">Produtos</h1>
      <button class="btn btn--primary" id="novoProdutoBtn" type="button">+ Novo produto</button>
    </div>

    <!-- Formulário de cadastro/edição -->
    <div class="form-panel" id="formPanel" hidden>
      <h2 class="form-panel__title" id="formTitle">Novo produto</h2>

      <form id="produtoForm" novalidate>
        <input type="hidden" id="produtoId" />

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="nome">Nome *</label>
            <input class="form-input" type="text" id="nome" placeholder="Ex: Bolo de chocolate" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="preco">Preço (R$) *</label>
            <input class="form-input" type="number" id="preco" placeholder="0,00" min="0" step="0.01" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="descricao">Descrição</label>
          <textarea class="form-input form-textarea" id="descricao" placeholder="Descreva o produto..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="imagem_url">URL da imagem</label>
          <input class="form-input" type="url" id="imagem_url" placeholder="https://..." />
        </div>

        <p class="form-error" id="formError" aria-live="polite"></p>

        <div class="form-actions">
          <button class="btn btn--primary" type="submit" id="salvarBtn">Salvar</button>
          <button class="btn btn--outline" type="button" id="cancelarBtn">Cancelar</button>
        </div>
      </form>
    </div>

    <!-- Listagem -->
    <p class="estado-vazio" id="loadingMsg">Carregando produtos…</p>
    <div class="produtos-grid" id="produtosGrid"></div>

  </main>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/produtos.js"></script>

</body>
</html>
